# ============================================================
#  Cloud Build — build + deploy Backend & Frontend to Cloud Run
#  Triggered manually or by CI/CD on push to main.
# ============================================================
steps:
  # ── Download ML model from GCS ─────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'download-model'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud storage cp -r gs://inmuebles-app-437-v2-ml-models/mlruns/ ./mlruns/

  # ── Build (parallel) ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args: ['build', '-f', 'Dockerfile.backend', '-t',
           'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/backend:$_SHORT_SHA', '-t',
           'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/backend:latest', '.']
    waitFor: ['download-model']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args: ['build', '-f', 'Dockerfile.frontend', '-t',
           'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/frontend-app:$_SHORT_SHA', '-t',
           'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/frontend-app:latest', '.']

  # ── Push (parallel) ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', 'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', 'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/frontend-app']
    waitFor: ['build-frontend']

  # ── Deploy Backend ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        MONGO_URI=$$(gcloud secrets versions access latest --secret=MONGO_URI)

        gcloud run deploy backend \
          --image us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/backend:$_SHORT_SHA \
          --port 8000 --memory 2Gi --cpu 1 \
          --region us-east1 --allow-unauthenticated \
          --set-env-vars "MONGO_URI=$$MONGO_URI,LOCAL=false"
    waitFor: ['push-backend']

  # ── Get Backend internal URL ──────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-backend-url'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        API_URL=$$(gcloud run services describe backend \
          --region=us-east1 --format="value(status.url)")
        echo "API_URL=$$API_URL" > /workspace/backend-url.env
    waitFor: ['deploy-backend']

  # ── Deploy Frontend ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/backend-url.env

        gcloud run deploy frontend-app \
          --image us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/frontend-app:$_SHORT_SHA \
          --port 80 --memory 1Gi --cpu 1 \
          --region us-east1 --allow-unauthenticated \
          --set-env-vars "BACKEND_URL=$$API_URL"
    waitFor: ['push-frontend', 'get-backend-url']

substitutions:
  _SHORT_SHA: 'latest'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/backend:latest'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/inmuebles-app/frontend-app:latest'

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
